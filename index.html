<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Cinta ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff5f9e,#ff9fcf,#ffd8ec);
color:white;
}

header{
padding:50px 20px;
text-align:center;
}

header h1{
font-size:40px;
margin-bottom:10px;
}

header p{
font-size:18px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:20px;
max-width:1000px;
margin:auto;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:18px;
cursor:pointer;
transition:.3s;
box-shadow:0 8px 20px rgba(0,0,0,.3);
}

.gallery img:hover{
transform:scale(1.05);
}

.message{
max-width:700px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:20px;
text-align:center;
}

button{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff4d88;
font-size:18px;
cursor:pointer;
}

#love{
display:none;
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:15px;
}
</style>
</head>

<body>

<header>
<h1>❤️ Galeri Cinta Kita ❤️</h1>
<p>Setiap foto memiliki kenangan yang tidak akan pernah kulupakan.</p>
</header>

<div class="gallery">
<img src="foto1.jpg" onclick="lihat(this.src)">
<img src="foto2.jpg" onclick="lihat(this.src)">
<img src="3.jpg" onclick="lihat(this.src)">
<img src="foto4.jpg" onclick="lihat(this.src)">
<img src="foto5.jpg" onclick="lihat(this.src)">
<img src="foto6.jpg" onclick="lihat(this.src)">
</div>

<div class="message">
<h2>Untuk Kamu 💖</h2>
<p>
Terima kasih sudah menjadi bagian terindah dalam hidupku.
Semoga kita selalu bersama dan saling menjaga sampai kapan pun.
</p>

<button onclick="sayang()">Klik di Sini ❤️</button>

<div id="love">
Aku Sayang Kamu Selamanya 🥰❤️
</div>
</div>

<div class="modal" id="modal" onclick="tutup()">
<img id="gambar">
</div>

<script>
function sayang(){
document.getElementById("love").style.display="block";
}

function lihat(src){
document.getElementById("modal").style.display="flex";
document.getElementById("gambar").src=src;
}

function tutup(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
